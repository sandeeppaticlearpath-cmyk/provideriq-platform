<!DOCTYPE html>
<html>
<head>
    <title>ProviderIQ</title>
    <style>
        body {
            font-family: Arial;
            background: #0b1220;
            color: white;
            margin: 0;
        }

        .header {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .search-box {
            text-align: center;
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 60px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
            padding: 5px;
        }

        select {
            margin-top: 10px;
            padding: 5px;
        }

        .section-title {
            font-size: 20px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="header">ProviderIQ 🚀</div>

<div class="search-box">
    <input id="searchInput" placeholder="Search provider (e.g. Smith)">
    <button onclick="search()">Search</button>
</div>

<div class="container">

    <div id="results"></div>

    <div class="section-title">📌 Book of Business</div>
    <div id="savedContainer"></div>

</div>

<script>

// ------------------ SEARCH ------------------
async function search() {
    const query = document.getElementById('searchInput').value;

    const res = await fetch(`/search?query=${query}`);
    const data = await res.json();

    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';

    data.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
            <b>${p.name}</b><br>
            NPI: ${p.npi}<br>
            State: ${p.state}<br><br>
            <button onclick='saveProvider(${JSON.stringify(p)})'>Save</button>
        `;

        resultsDiv.appendChild(div);
    });
}

// ------------------ SAVE ------------------
async function saveProvider(provider) {
    await fetch('/save_provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(provider)
    });

    loadSaved();
}

// ------------------ LOAD SAVED ------------------
async function loadSaved() {
    const res = await fetch('/get_saved');
    const data = await res.json();

    const container = document.getElementById('savedContainer');
    container.innerHTML = '';

    data.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
            <b>${p.name || ''}</b><br>
            NPI: ${p.npi}<br>

            Status:
            <select onchange="updateProvider('${p.npi}', this.value, this.nextElementSibling.value)">
                <option ${p.status==='New'?'selected':''}>New</option>
                <option ${p.status==='Contacted'?'selected':''}>Contacted</option>
                <option ${p.status==='Hot Lead'?'selected':''}>Hot Lead</option>
                <option ${p.status==='Closed'?'selected':''}>Closed</option>
            </select>

            <br>

            Notes:
            <textarea onblur="updateProvider('${p.npi}', this.previousElementSibling.value, this.value)">
                ${p.notes || ''}
            </textarea>

            <br>
            <button onclick="deleteProvider('${p.npi}')">Delete</button>
        `;

        container.appendChild(div);
    });
}

// ------------------ UPDATE ------------------
async function updateProvider(npi, status, notes) {
    await fetch('/update_provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ npi, status, notes })
    });
}

// ------------------ DELETE ------------------
async function deleteProvider(npi) {
    await fetch('/delete_provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ npi })
    });

    loadSaved();
}

// ------------------ LOAD ON START ------------------
window.onload = loadSaved;

</script>

</body>
</html>
