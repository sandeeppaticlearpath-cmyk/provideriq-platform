<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ProviderIQ</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.header {
    padding: 20px;
    font-size: 24px;
    text-align: center;
    background: #020617;
}

.search-box {
    text-align: center;
    margin: 30px;
}

input {
    padding: 10px;
    width: 300px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.results, #saved {
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

.name {
    font-weight: bold;
}

textarea {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">ProviderIQ 🚀</div>

<div class="search-box">
    <input type="text" id="name" placeholder="Search provider (e.g. Smith)">
    <button onclick="search()">Search</button>
</div>

<div class="results" id="results"></div>

<hr>

<div id="saved"></div>

<script>
let globalData = [];

/* SEARCH */
function search() {
    let name = document.getElementById("name").value;

    if (!name) {
        alert("Enter a name");
        return;
    }

    fetch(`/search?name=${name}`)
    .then(res => res.json())
    .then(data => {
        globalData = data.results;
        renderResults(globalData);
    });
}

/* SHOW SEARCH RESULTS */
function renderResults(data) {
    let html = "<h2>Search Results</h2>";

    data.forEach(p => {
        html += `
        <div class="card">
            <div class="name">${p.name}</div>
            <div>State: ${p.state}</div>
            <div>Status: ${p.status}</div>
            <div>NPI: ${p.npi}</div>

            <button onclick='saveProvider(${JSON.stringify(p)})'>Save</button>
        </div>
        `;
    });

    document.getElementById("results").innerHTML = html;
}

/* SAVE PROVIDER */
function saveProvider(p) {
    fetch("/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(p)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadSaved();
    });
}

/* LOAD SAVED */
function loadSaved() {
    fetch("/saved")
    .then(res => res.json())
    .then(data => {
        let html = "<h2>📌 Book of Business</h2>";

        data.forEach(p => {
            html += `
            <div class="card">
                <div class="name">${p.name}</div>
                <div>NPI: ${p.npi}</div>

                <label>Status:</label>
                <select onchange="updateTag('${p.npi}', this.value)">
                    <option ${p.tag=="New"?"selected":""}>New</option>
                    <option ${p.tag=="Hot Lead"?"selected":""}>Hot Lead</option>
                    <option ${p.tag=="Contacted"?"selected":""}>Contacted</option>
                    <option ${p.tag=="Follow-up"?"selected":""}>Follow-up</option>
                </select>

                <br><br>

                <label>Notes:</label>
                <textarea 
                    onchange="updateNotes('${p.npi}', this.value)"
                    style="width:100%; height:60px;">${p.notes || ""}</textarea>

                <br><br>

                <button onclick="deleteProvider('${p.npi}')">Delete</button>
            </div>
            `;
        });

        document.getElementById("saved").innerHTML = html;
    });
}

/* UPDATE NOTES */
function updateNotes(npi, notes) {
    fetch("/update", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ npi: npi, notes: notes })
    });
}

/* UPDATE TAG */
function updateTag(npi, tag) {
    fetch("/update", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ npi: npi, tag: tag })
    });
}

/* DELETE */
function deleteProvider(npi) {
    fetch("/delete", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ npi: npi })
    })
    .then(() => loadSaved());
}

/* AUTO LOAD */
window.onload = loadSaved;

</script>

</body>
</html>
