<!DOCTYPE html>
<html>
<head>
    <title>ProviderIQ</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
        }

        .header {
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .search-container {
            text-align: center;
            margin: 20px;
        }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background: #2563eb;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        .section {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .title {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
            background: #334155;
        }

        .small {
            color: #94a3b8;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            border-radius: 8px;
            border: none;
            padding: 8px;
            margin-top: 8px;
        }

        select {
            margin-top: 8px;
            padding: 5px;
            border-radius: 6px;
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            background: #22c55e;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
        }

        @media(max-width: 800px){
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="header">🚀 ProviderIQ Dashboard</div>

<div class="search-container">
    <input id="searchInput" placeholder="Search provider (Smith)">
    <button onclick="search()">Search</button>
</div>

<div class="container">

    <!-- SEARCH RESULTS -->
    <div class="section">
        <div class="title">🔍 Search Results</div>
        <div id="results"></div>
    </div>

    <!-- BOOK OF BUSINESS -->
    <div class="section">
        <div class="title">📌 Book of Business</div>
        <div id="saved"></div>
    </div>

</div>

<script>

// ---------------- SEARCH ----------------
async function search() {
    const query = document.getElementById('searchInput').value;
    const resultsDiv = document.getElementById('results');

    resultsDiv.innerHTML = `<div class="loading">Searching...</div>`;

    const res = await fetch(`/search?query=${query}`);
    const data = await res.json();

    resultsDiv.innerHTML = '';

    data.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
            <b>${p.name || 'No Name'}</b><br>
            <span class="small">NPI: ${p.npi}</span><br>
            <span class="small">${p.address}</span><br>
            <span class="small">📞 ${p.phone || 'N/A'}</span><br>
            <span class="tag">${p.specialty || 'Unknown'}</span><br><br>
            <button onclick='save(${JSON.stringify(p)})'>Save</button>
        `;

        resultsDiv.appendChild(div);
    });
}

// ---------------- SAVE ----------------
async function save(provider) {
    await fetch('/save_provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(provider)
    });

    loadSaved();
}

// ---------------- LOAD SAVED ----------------
async function loadSaved() {
    const res = await fetch('/get_saved');
    const data = await res.json();

    const savedDiv = document.getElementById('saved');
    savedDiv.innerHTML = '';

    data.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
            <b>${p.name}</b><br>
            <span class="small">NPI: ${p.npi}</span><br>
            <span class="small">${p.address}</span><br>
            <span class="small">📞 ${p.phone || 'N/A'}</span><br>
            <span class="tag">${p.specialty || 'Unknown'}</span><br>

            Status:
            <select onchange="update('${p.npi}', this.value, this.nextElementSibling.value)">
                <option ${p.status==='New'?'selected':''}>New</option>
                <option ${p.status==='Contacted'?'selected':''}>Contacted</option>
                <option ${p.status==='Hot Lead'?'selected':''}>Hot Lead</option>
                <option ${p.status==='Closed'?'selected':''}>Closed</option>
            </select>

            <textarea onblur="update('${p.npi}', this.previousElementSibling.value, this.value)">
${p.notes || ''}
            </textarea>

            <button onclick="del('${p.npi}')">Delete</button>
        `;

        savedDiv.appendChild(div);
    });
}

// ---------------- UPDATE ----------------
async function update(npi, status, notes) {
    await fetch('/update_provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ npi, status, notes })
    });
}

// ---------------- DELETE ----------------
async function del(npi) {
    await fetch('/delete_provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ npi })
    });

    loadSaved();
}

// ---------------- INIT ----------------
window.onload = loadSaved;

</script>

</body>
</html>
